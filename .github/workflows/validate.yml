name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  local-contract:
    runs-on: ubuntu-latest
    env:
      RELEASE_QA_DIR: ${{ github.workspace }}/.release-qa-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run dependency-free README quick start offline
        run: |
          python3 skill/draft-patents-evidence-first/scripts/init_case.py ./demo-case --case-id demo-case --language bilingual --patent-type invention
          python3 skill/draft-patents-evidence-first/scripts/validate_case.py ./demo-case
          python3 skill/draft-patents-evidence-first/scripts/scan_sensitive.py ./demo-case --format json
      - name: Install document rendering and text-extraction tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer poppler-utils fonts-noto-cjk
      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Check Python syntax
        run: python -m compileall -q skill/draft-patents-evidence-first/scripts
      - name: Validate Skill contract
        run: python tests/vendor/quick_validate.py skill/draft-patents-evidence-first
      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v
      - name: Execute fixture acceptance matrix
        run: |
          if ! python skill/draft-patents-evidence-first/scripts/run_acceptance.py --repo . --fixtures tests/fixtures --report .workflow/ci-test-report.json; then
            python - <<'PY'
          import json
          report = json.load(open('.workflow/ci-test-report.json', encoding='utf-8'))
          print('failed_checks=', report.get('failed_checks', []))
          for fixture in report.get('fixture_results', []):
              if fixture.get('status') != 'PASS':
                  print('fixture=', fixture.get('id'))
                  print('assertions=', [item for item in fixture.get('assertions', []) if not item.get('passed')])
                  print('checks=', [item for item in fixture.get('checks', []) if item.get('exit_code') and not item.get('expected_failure')])
          PY
            exit 1
          fi
      - name: Exercise command help
        run: |
          for f in skill/draft-patents-evidence-first/scripts/{init_case,validate_case,dedupe_families,trace_claims,compare_bilingual,scan_sensitive,build_package,run_acceptance,resolve_language,validate_media,inspect_artifacts}.py; do python "$f" --help; done
      - name: Check for release-sensitive markers
        run: python skill/draft-patents-evidence-first/scripts/scan_sensitive.py . --format json
      - name: Inspect public-asset metadata
        run: python skill/draft-patents-evidence-first/scripts/inspect_artifacts.py public-assets --format json
      - name: Validate media ledger and hashes
        run: python skill/draft-patents-evidence-first/scripts/validate_media.py --ledger public-assets/media-ledger.md
      - name: Rebuild release candidate in a clean temporary directory
        run: |
          test ! -e "$RELEASE_QA_DIR"
          mkdir -p "$RELEASE_QA_DIR"
          python tests/build_release_samples.py --repo . --output "$RELEASE_QA_DIR/samples"
          python tests/build_source_archive.py --repo . --output "$RELEASE_QA_DIR/evidence-first-patent-skill-v0.1.0.zip"
          python tests/build_release_manifest.py --repo . --release "$RELEASE_QA_DIR" --output "$RELEASE_QA_DIR/release-manifest.json"
      - name: Verify rebuilt release membership, hashes, CRC, and metadata
        run: |
          python tests/verify_release_assets.py --repo . --release "$RELEASE_QA_DIR" --manifest "$RELEASE_QA_DIR/release-manifest.json" --source-archive "$RELEASE_QA_DIR/evidence-first-patent-skill-v0.1.0.zip"
          python skill/draft-patents-evidence-first/scripts/inspect_artifacts.py "$RELEASE_QA_DIR" --format json
